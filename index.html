<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamie Fraser | Game Designer</title>

<style>
:root {
    --bg: #0b0f1a;
    --panel: #111827;
    --accent: #00ff9c;
    --text: #d1d5db;
    --tab: #1f2937;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Courier New", monospace;
}

body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
}

/* Window */
.window {
    width: min(92vw, 980px);
    margin: 0;
    background: var(--panel);
    border: 2px solid var(--accent);
    border-radius: 12px;
    box-shadow: 0 0 30px rgba(0,255,156,0.18);
    overflow: hidden;
}

/* Tabs */
.tabs {
    display: flex;
    justify-content: center;
    background: var(--tab);
    border-bottom: 2px solid var(--accent);
}

.tab {
    padding: 14px 24px;
    cursor: pointer;
    border-right: 1px solid #000;
    transition: background 0.25s ease, transform 0.25s ease;
}

.tab:last-child {
    border-right: none;
}

.tab:hover {
    transform: translateY(-1px);
}

.tab.active {
    background: var(--panel);
    color: var(--accent);
}

/* Content */
.content {
    padding: 28px 30px;
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transform: scaleY(0.96);
    transform-origin: top;
    transition: max-height 0.45s ease, opacity 0.32s ease, transform 0.32s ease;
}

.content.active {
    max-height: 320px;
    opacity: 1;
    transform: scaleY(1);
}

h1 {
    color: var(--accent);
    margin-bottom: 10px;
}

h2 {
    margin-bottom: 15px;
    color: var(--accent);
}

.projects {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
}

.card {
    background: #020617;
    padding: 15px;
    border: 1px solid var(--accent);
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.03);
}

.link {
    display: block;
    margin-top: 10px;
    color: var(--accent);
    text-decoration: none;
}

.link:hover {
    text-decoration: underline;
}

.footer {
    text-align: center;
    padding: 10px;
    font-size: 0.8rem;
    opacity: 0.6;
}
</style>
</head>
<body>

<div class="window">

    <div class="tabs">
        <div class="tab active" onclick="openTab('about', event)">[ ABOUT.EXE ]</div>
        <div class="tab" onclick="openTab('projects', event)">[ PROJECT.DAT ]</div>
        <div class="tab" onclick="openTab('links', event)">[ LINKS.SYS ]</div>
    </div>

    <div id="about" class="content active"></div>

    <div id="projects" class="content"></div>

    <div id="links" class="content"></div>

    <div class="footer">
        © 2026 Jamie Fraser
    </div>

</div>

<script>
function openTab(tabId, event) {
    const contents = document.querySelectorAll('.content');
    const tabs = document.querySelectorAll('.tab');

    contents.forEach(c => c.classList.remove('active'));
    tabs.forEach(t => t.classList.remove('active'));

    document.getElementById(tabId).classList.add('active');
    if (event && event.currentTarget) {
        event.currentTarget.classList.add('active');
    }
}
</script>

</body>
</html>
